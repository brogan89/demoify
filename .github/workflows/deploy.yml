name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys racing migrations.
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Needed to push the release tag back to the repo.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Surface secrets as env so steps can detect whether deploy is configured.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      # Deploy secrets are mandatory. Fail loud if missing — a silently skipped
      # deploy looks green but leaves production stale (or, with a proxied DNS
      # record and no worker, hanging). See DEPLOYMENT.md.
      - name: Check deploy is configured
        id: gate
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Deploy secrets not set (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID). Set them in repo settings — see DEPLOYMENT.md."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      # One version per deploy: date + the monotonic run number (e.g. v2026.06.26-42).
      # Baked into the build (footer) and used as the git tag after a clean deploy.
      - name: Compute version
        if: steps.gate.outputs.ready == 'true'
        id: version
        run: echo "version=v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - name: Generate Prisma client
        if: steps.gate.outputs.ready == 'true'
        run: npx prisma generate

      - name: Apply D1 migrations (production)
        if: steps.gate.outputs.ready == 'true'
        run: npx wrangler d1 migrations apply demoify --remote

      - name: Build & deploy (OpenNext → Cloudflare Workers)
        if: steps.gate.outputs.ready == 'true'
        # BETTER_AUTH_SECRET is surfaced to the build so better-auth doesn't fall
        # back to its default secret while collecting page data. The worker's
        # runtime copy is set separately via `wrangler secret put` (see DEPLOYMENT.md).
        # NEXT_PUBLIC_APP_VERSION is inlined into the bundle and shown in the footer.
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          NEXT_PUBLIC_APP_VERSION: ${{ steps.version.outputs.version }}
        run: npm run deploy

      # Tag the deployed commit with the same version now that the deploy succeeded.
      - name: Tag release
        if: steps.gate.outputs.ready == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
