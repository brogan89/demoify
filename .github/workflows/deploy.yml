name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys racing migrations.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations (Neon direct URL)
        run: npx prisma migrate deploy
        env:
          # Neon DIRECT (non-pooled) connection string — migrations bypass Hyperdrive.
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL }}

      - name: Build & deploy (OpenNext → Cloudflare Workers)
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
