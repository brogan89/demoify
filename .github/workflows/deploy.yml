name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys racing migrations.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Surface secrets as env so steps can detect whether deploy is configured.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      # Deploy secrets are mandatory. Fail loud if missing — a silently skipped
      # deploy looks green but leaves production stale (or, with a proxied DNS
      # record and no worker, hanging). See DEPLOYMENT.md.
      - name: Check deploy is configured
        id: gate
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Deploy secrets not set (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID). Set them in repo settings — see DEPLOYMENT.md."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - name: Generate Prisma client
        if: steps.gate.outputs.ready == 'true'
        run: npx prisma generate

      - name: Apply D1 migrations (production)
        if: steps.gate.outputs.ready == 'true'
        run: npx wrangler d1 migrations apply demoify --remote

      - name: Build & deploy (OpenNext → Cloudflare Workers)
        if: steps.gate.outputs.ready == 'true'
        # BETTER_AUTH_SECRET is surfaced to the build so better-auth doesn't fall
        # back to its default secret while collecting page data. The worker's
        # runtime copy is set separately via `wrangler secret put` (see DEPLOYMENT.md).
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        run: npm run deploy
