# Local Postgres for development. Credentials match the default DATABASE_URL in
# .env.example: postgresql://postgres:postgres@localhost:5432/demoify
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demoify
    ports:
      - "5432:5432"
    volumes:
      - demoify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demoify"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  demoify_pgdata:
